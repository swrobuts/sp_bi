    const { useState, useEffect } = React;

    // ─── CodeBlock Component ──────────────────────────────────────────────────
    function CodeBlock({ code, lang }) {
      const [copied, setCopied] = React.useState(false);
      const copy = () => {
        navigator.clipboard.writeText(code).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        }).catch(() => {
          const el = document.createElement('textarea');
          el.value = code;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      };
      const labelCopy = lang === 'en' ? 'Copy' : 'Kopieren';
      const labelDone = lang === 'en' ? '\u2713 Copied' : '\u2713 Kopiert';
      return (
        <div style={{ position: 'relative', marginBottom: '1rem' }}>
          <pre className="code-block">{code}</pre>
          <button onClick={copy} style={{
            position: 'absolute', top: '0.5rem', right: '0.5rem',
            background: copied ? '#059669' : '#E5E7EB',
            color: copied ? 'white' : '#374151',
            border: 'none', borderRadius: '4px',
            padding: '0.2rem 0.5rem', fontSize: '0.75rem',
            cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif'
          }}>
            {copied ? labelDone : labelCopy}
          </button>
        </div>
      );
    }

    // ─── QuizQuestion Component ──────────────────────────────────────────────
    function QuizQuestion({ question, index, lang }) {
      const [selected, setSelected] = React.useState(null);
      const isCorrect = selected === question.correct;
      return (
        <div style={{ marginBottom: '1.5rem', padding: '1.25rem', background: 'white', border: '1px solid #E5E7EB', borderRadius: '10px' }}>
          <p style={{ fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif", margin: '0 0 0.75rem', color: '#1A1A1A' }}>
            {index + 1}. {question.q}
          </p>
          <div style={{ display: 'grid', gap: '0.5rem' }}>
            {question.options.map((opt, oi) => {
              let bg = 'white'; let border = '#D1D5DB'; let color = '#374151';
              if (selected !== null) {
                if (oi === question.correct) { bg = '#D1FAE5'; border = '#059669'; color = '#065F46'; }
                else if (oi === selected) { bg = '#FEE2E2'; border = '#DC2626'; color = '#991B1B'; }
              }
              return (
                <button key={oi} disabled={selected !== null} onClick={() => setSelected(oi)}
                  className="quiz-option"
                  style={{
                    textAlign: 'left', padding: '0.6rem 1rem', fontSize: '0.88rem',
                    background: bg, border: '1.5px solid ' + border, borderRadius: '6px',
                    color, cursor: selected !== null ? 'default' : 'pointer',
                    fontFamily: 'inherit', transition: 'border-color 0.15s, background 0.15s'
                  }}>
                  {opt}
                </button>
              );
            })}
          </div>
          {selected !== null && (
            <p style={{ marginTop: '0.5rem', fontSize: '0.85rem', fontWeight: 600, color: isCorrect ? '#059669' : '#DC2626' }}>
              {isCorrect ? (lang === 'en' ? '\u2713 Correct!' : '\u2713 Richtig!') : (lang === 'en' ? '\u2717 Incorrect' : '\u2717 Falsch')}
            </p>
          )}
        </div>
      );
    }

    // ─── Code constants (language-independent) ──────────────────────────────
    const CODE_EXPLORE = "import pandas as pd\nimport numpy as np\n\n# Datensatz laden (UTF-8 oder latin-1)\ndf = pd.read_csv('superstore.csv', encoding='latin-1')\n\n# Grundlegende Infos\nprint(df.shape)          # (9994, 21)\nprint(df.dtypes)         # Datentypen pr\u00FCfen\nprint(df.isnull().sum()) # Nullwerte pr\u00FCfen\nprint(df.describe())     # Statistische \u00DCbersicht\n\n# Key Stats\nprint(f\"Gesamtumsatz:  ${df['Sales'].sum():,.0f}\")\nprint(f\"Gesamtgewinn:  ${df['Profit'].sum():,.0f}\")\nprint(f\"Marge:          {df['Profit'].sum()/df['Sales'].sum()*100:.1f}%\")\nprint(f\"Bestellungen:   {df['Order ID'].nunique()}\")\nprint(f\"Zeitraum:       {df['Order Date'].min()} bis {df['Order Date'].max()}\")";

    const CODE_MEASURES = "-- Grundlegende Measures\n\nUmsatz =\nSUM(Orders[Sales])\n\nGewinn =\nSUM(Orders[Profit])\n\nMarge_Pct =\nDIVIDE([Gewinn], [Umsatz], 0) * 100\n\nBestellungen =\nCOUNTROWS(Orders)\n\nAvg_Bestellwert =\nDIVIDE([Umsatz], DISTINCTCOUNT(Orders[Order ID]), 0)\n\nUmsatz_VJ =\nCALCULATE([Umsatz], SAMEPERIODLASTYEAR(Orders[Order Date]))\n\nYoY_Wachstum =\nDIVIDE([Umsatz] - [Umsatz_VJ], [Umsatz_VJ], 0) * 100";

    const CODE_DASH = "# app.py \u2013 Superstore Retail Analytics Dashboard\nimport dash\nfrom dash import dcc, html, Input, Output\nimport plotly.express as px\nimport pandas as pd\n\napp = dash.Dash(__name__)\n\n# Daten laden und vorbereiten\ndf = pd.read_csv('superstore.csv', encoding='latin-1')\ndf['Order Date'] = pd.to_datetime(df['Order Date'])\ndf['Month'] = df['Order Date'].dt.to_period('M').dt.to_timestamp()\n\n# Farben als Python-Konstanten (NICHT CSS-Variablen!)\n# Plotly rendert zu SVG/Canvas, nicht ins DOM \u2013\n# var(--col-primary) funktioniert dort nicht.\nCOL_PRIMARY = '#1E3A8A'\nCOL_ACCENT  = '#2563EB'\n\napp.layout = html.Div([\n    # Header\n    html.Div([\n        html.H1('Superstore Analytics Dashboard',\n                style={'margin': '0', 'fontSize': '1.5rem'}),\n    ], style={'background': COL_PRIMARY, 'color': 'white',\n              'padding': '1rem 2rem'}),\n\n    # Filter\n    html.Div([\n        html.Div([\n            html.Label('Segment:'),\n            dcc.Dropdown(\n                id='segment-filter',\n                options=[{'label': s, 'value': s}\n                         for s in df['Segment'].unique()],\n                value=df['Segment'].unique().tolist(),\n                multi=True, clearable=False\n            ),\n        ], style={'flex': 1}),\n        html.Div([\n            html.Label('Region:'),\n            dcc.Dropdown(\n                id='region-filter',\n                options=[{'label': r, 'value': r}\n                         for r in df['Region'].unique()],\n                value=df['Region'].unique().tolist(),\n                multi=True, clearable=False\n            ),\n        ], style={'flex': 1}),\n    ], style={'display': 'flex', 'gap': '1rem',\n              'padding': '1rem 2rem', 'background': '#f8fafc'}),\n\n    # KPI Cards\n    html.Div(id='kpi-cards',\n             style={'display': 'grid',\n                    'gridTemplateColumns': 'repeat(4, 1fr)',\n                    'gap': '1rem', 'padding': '1rem 2rem'}),\n\n    # Charts\n    html.Div([\n        dcc.Graph(id='trend-chart'),\n        dcc.Graph(id='category-chart'),\n    ], style={'display': 'grid', 'gridTemplateColumns': '1fr 1fr',\n              'gap': '1rem', 'padding': '0 2rem 1rem'}),\n\n    dcc.Graph(id='scatter-chart',\n              style={'padding': '0 2rem 2rem'}),\n])\n\ndef kpi_card(title, value, color=COL_PRIMARY):\n    return html.Div([\n        html.Div(value, style={'fontSize': '1.75rem', 'fontWeight': '800',\n                               'color': color}),\n        html.Div(title, style={'fontSize': '0.75rem', 'color': '#6B7280',\n                               'textTransform': 'uppercase',\n                               'letterSpacing': '0.08em'}),\n    ], style={'background': 'white', 'padding': '1.25rem',\n              'border': '1px solid #e5e7eb',\n              'borderLeft': f'4px solid {color}'})\n\n@app.callback(\n    Output('kpi-cards', 'children'),\n    Output('trend-chart', 'figure'),\n    Output('category-chart', 'figure'),\n    Output('scatter-chart', 'figure'),\n    Input('segment-filter', 'value'),\n    Input('region-filter', 'value')\n)\ndef update_dashboard(segments, regions):\n    fdf = df[df['Segment'].isin(segments) &\n             df['Region'].isin(regions)]\n\n    # KPI Cards\n    total_sales = fdf['Sales'].sum()\n    total_profit = fdf['Profit'].sum()\n    margin = total_profit / total_sales * 100 if total_sales else 0\n    orders = fdf['Order ID'].nunique()\n\n    cards = [\n        kpi_card('Umsatz', f'${total_sales:,.0f}'),\n        kpi_card('Gewinn', f'${total_profit:,.0f}'),\n        kpi_card('Marge', f'{margin:.1f}%', COL_ACCENT),\n        kpi_card('Bestellungen', f'{orders:,}'),\n    ]\n\n    # Trend\n    trend = fdf.groupby('Month')['Sales'].sum().reset_index()\n    fig1 = px.line(trend, x='Month', y='Sales',\n                   title='Umsatz-Trend (monatlich)',\n                   color_discrete_sequence=[COL_ACCENT])\n    fig1.update_layout(plot_bgcolor='white', paper_bgcolor='white')\n\n    # Kategorie\n    by_cat = fdf.groupby('Category')['Sales'].sum().reset_index()\n    fig2 = px.bar(by_cat, x='Category', y='Sales',\n                  title='Umsatz nach Kategorie',\n                  color_discrete_sequence=[COL_PRIMARY])\n    fig2.update_layout(plot_bgcolor='white', paper_bgcolor='white')\n\n    # Scatter\n    by_sub = fdf.groupby('Sub-Category').agg(\n        Sales=('Sales','sum'), Profit=('Profit','sum')\n    ).reset_index()\n    fig3 = px.scatter(by_sub, x='Sales', y='Profit',\n                      text='Sub-Category', size='Sales',\n                      title='Umsatz vs. Gewinn nach Sub-Kategorie',\n                      color_discrete_sequence=[COL_ACCENT])\n    fig3.update_layout(plot_bgcolor='white', paper_bgcolor='white')\n\n    return cards, fig1, fig2, fig3\n\nif __name__ == '__main__':\n    app.run(debug=True)";

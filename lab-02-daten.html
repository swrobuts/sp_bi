function CodeBlock({ code }) {
  var [copied, setCopied] = React.useState(false);
  var copy = function() {
    navigator.clipboard.writeText(code).then(function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1500);
    }).catch(function() {
      var el = document.createElement('textarea');
      el.value = code;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1500);
    });
  };
  return (
    <div style={{ position: 'relative', marginBottom: '1rem' }}>
      <pre className="code-block">{code}</pre>
      <button onClick={copy} style={{
        position: 'absolute', top: '0.5rem', right: '0.5rem',
        background: copied ? '#059669' : '#E5E7EB',
        color: copied ? 'white' : '#374151',
        border: 'none', padding: '0.2rem 0.5rem', fontSize: '0.75rem',
        cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif'
      }}>{copied ? '✓ Kopiert' : 'Kopieren'}</button>
    </div>
  );
}

var codeDataQuality = `import pandas as pd

df = pd.read_csv('data.csv')

# Nullwerte prüfen
print(df.isnull().sum())

# Nullwerte auffüllen
df['Umsatz'].fillna(0, inplace=True)
df['Land'].fillna('Unbekannt', inplace=True)

# Duplikate entfernen
df = df.drop_duplicates()

# Datentypen konvertieren
df['Datum'] = pd.to_datetime(df['Datum'])
df['Preis'] = pd.to_numeric(df['Preis'], errors='coerce')

# String-Bereinigung
df['Land'] = df['Land'].str.strip().str.upper()

# Inkonsistenzen beheben
df['Land'] = df['Land'].replace({
    'GERMANY': 'Deutschland',
    'DE': 'Deutschland',
    'GER': 'Deutschland'
})`;

var codeExercise = `import pandas as pd

df = pd.read_csv('sales.csv')

# 1. Nullwerte in Preis durch Mittelwert ersetzen
df['Preis'] = df['Preis'].fillna(df['Preis'].mean())

# 2. Duplikate anhand Order_ID entfernen

# 3. Datum konvertieren
df['Datum'] = pd.to_datetime(df['Datum'])

# 4. Spalte umbenennen

print(f"Datensätze nach Bereinigung: {len(df)}")

                return <li key={i} style={{ marginBottom: '0.4rem', lineHeight: '1.6' }}>{g}</li>;
              })}
            </ol>
          </div>
        </section>

        {/* Section 2: Datenquellen */}
        <section id="datenquellen" className="section-block">
          <h2>{t.s2.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <p>{t.s2.intro}</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '1rem', margin: '1.25rem 0' }}>
            <div className="tip-box">
              <h4>{t.s2.strukturiertLabel}</h4>
              <p style={{ margin: 0, fontSize: '0.9rem' }}>{t.s2.strukturiertDesc}</p>
            </div>
            <div className="tip-box">
              <h4>{t.s2.semiLabel}</h4>
              <p style={{ margin: 0, fontSize: '0.9rem' }}>{t.s2.semiDesc}</p>
            </div>
            <div className="tip-box">
              <h4>{t.s2.cloudLabel}</h4>
              <p style={{ margin: 0, fontSize: '0.9rem' }}>{t.s2.cloudDesc}</p>
            </div>
          </div>
          <div className="info-box">
            <h4 style={{ margin: '0 0 0.4rem' }}>{t.s2.powerBILabel}</h4>
            <p style={{ margin: 0, fontSize: '0.9rem' }}>{t.s2.powerBIDesc}</p>
          </div>
          <h3>{t.s2.pythonHeading}</h3>
          <CodeBlock code={codePython} />
        </section>

        {/* Section 3: Datenmodellierung */}
        <section id="datenmodellierung" className="section-block">
          <h2>{t.s3.heading}</h2>
          <div className="bauhaus-accent-line"></div>

          <h3>{t.s3.starHeading}</h3>
          <p>{t.s3.starDesc}</p>
          <CodeBlock code={codeStarSchema} />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', margin: '1rem 0' }}>
            <div className="concept-box">
              <h4>{t.s3.faktLabel}</h4>
              <p style={{ margin: 0, fontSize: '0.9rem' }}>{t.s3.faktDesc}</p>
            </div>
            <div className="concept-box">
              <h4>{t.s3.dimLabel}</h4>
              <p style={{ margin: 0, fontSize: '0.9rem' }}>{t.s3.dimDesc}</p>
            </div>
          </div>
          <div className="tip-box">
            <strong>{t.s3.vorteileLabel}:</strong>
            <ul style={{ margin: '0.5rem 0 0', paddingLeft: '1.25rem' }}>
              {t.s3.vorteile.map(function(v, i) {
                return <li key={i} style={{ fontSize: '0.9rem', marginBottom: '0.2rem' }}>{v}</li>;
              })}
            </ul>
          </div>

          <h3 style={{ marginTop: '2rem' }}>{t.s3.snowflakeHeading}</h3>
          <p>{t.s3.snowflakeDesc}</p>
          <p style={{ fontSize: '0.9rem', fontStyle: 'italic' }}>{t.s3.snowflakeExample}</p>

          <h4 style={{ marginTop: '1.5rem' }}>{t.s3.tableHeading}</h4>
          <table>
            <thead>
              <tr>
                <th>{t.s3.colAspect}</th>
                <th>{t.s3.colStar}</th>
                <th>{t.s3.colSnowflake}</th>
              </tr>
            </thead>
            <tbody>
              {t.s3.tableRows.map(function(row, i) {
                return (
                  <tr key={i}>
                    <td><strong>{row[0]}</strong></td>
                    <td>{row[1]}</td>
                    <td>{row[2]}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </section>

        {/* Section 4: Datenqualität */}
        <section id="datenqualitaet" className="section-block">
          <h2>{t.s4.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <p>{t.s4.intro}</p>
          <ul style={{ paddingLeft: '1.25rem' }}>
            {t.s4.problems.map(function(p, i) {
              return <li key={i} style={{ marginBottom: '0.4rem', lineHeight: '1.6' }}>{p}</li>;
            })}
          </ul>

          <h3>{t.s4.pandasHeading}</h3>
          <CodeBlock code={codeDataQuality} />

          <h3>{t.s4.powerQueryHeading}</h3>
          <div className="concept-box">
            <ol style={{ margin: 0, paddingLeft: '1.25rem' }}>
              {t.s4.powerQuerySteps.map(function(step, i) {
                return <li key={i} style={{ marginBottom: '0.5rem', lineHeight: '1.6', fontSize: '0.95rem' }}>{step}</li>;
              })}
            </ol>
          </div>
        </section>

        {/* Section 5: Übungsaufgabe */}
        <section id="uebung" className="section-block">
          <h2>{t.s5.heading}</h2>
          <div className="bauhaus-accent-line"></div>

          <div className="concept-box">
            <h4 style={{ marginTop: 0 }}>{t.s5.taskHeading}</h4>
            <p style={{ marginBottom: '0.5rem' }}>{t.s5.taskDesc}</p>
            <ol style={{ margin: 0, paddingLeft: '1.25rem' }}>
              {t.s5.tasks.map(function(task, i) {
                return <li key={i} style={{ marginBottom: '0.4rem', lineHeight: '1.6', fontSize: '0.95rem' }}>{task}</li>;
              })}
            </ol>
          </div>

          <h3>{t.s5.solutionHeading}</h3>
          <CodeBlock code={codeExercise} />
        </section>

        {/* Section 6: Ressourcen */}
        <section id="ressourcen" className="section-block">
          <h2>{t.s6.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <p>{t.s6.intro}</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
            {t.s6.resources.map(function(r, i) {
              return (
                <div key={i} className="tip-box" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '0.5rem' }}>
                  <div>
                    <strong style={{ fontSize: '0.95rem' }}>{r.title}</strong>
                    <span style={{ color: '#555', fontSize: '0.88rem', marginLeft: '0.5rem' }}>{String.fromCharCode(8211)} {r.channel}</span>
                  </div>
                  <a href={r.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.85rem', color: '#2563EB', fontWeight: 600, textDecoration: 'none' }}>{r.url.replace('https://', '')}</a>
                </div>
              );
            })}
          </div>
        </section>

        {/* Bottom Navigation */}
        <div className="nav-bottom">
          <a href="lab-01-grundlagen.html" className="nav-btn">{t.navBack}</a>
          <a href="lab-03-kpis.html" className="nav-btn primary">{t.navNext}</a>
        </div>
      </main>

      {/* Footer */}
      <footer className="footer">
        <p className="footer-text">{'THWS Business School \u2013 Business Intelligence Lab \u2013 Lab 02: Daten'}</p>
      </footer>
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

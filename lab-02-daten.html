    // ─── CodeBlock Component ──────────────────────────────────────────────────
    function CodeBlock({ code, lang }) {
      const [copied, setCopied] = React.useState(false);
      const copy = () => {
        navigator.clipboard.writeText(code).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        }).catch(() => {
          const el = document.createElement('textarea');
          el.value = code;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      };
      return (
        <div style={{ position: 'relative', marginBottom: '1rem' }}>
          <pre className="code-block">{code}</pre>
          <button onClick={copy} style={{
            position: 'absolute', top: '0.5rem', right: '0.5rem',
            background: copied ? '#059669' : '#E5E7EB',
            color: copied ? 'white' : '#374151',
            border: 'none', borderRadius: '4px',
            padding: '0.2rem 0.5rem', fontSize: '0.75rem',
            cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif'
          }}>
            {copied ? (lang === 'en' ? '\u2713 Copied' : '\u2713 Kopiert') : (lang === 'en' ? 'Copy' : 'Kopieren')}
          </button>
        </div>
      );
    }

    // ─── QuizQuestion Component ───────────────────────────────────────────────
    function QuizQuestion({ question, options, correctIndex, explanation }) {
      const [selected, setSelected] = React.useState(null);
      return (
        <div className="quiz-question-block">
          <h4>{question}</h4>
          {options.map((opt, i) => {
            let cls = 'quiz-option';
            if (selected !== null) {
              if (i === correctIndex) cls += ' correct';
              else if (i === selected) cls += ' wrong';
            }
            return (
              <button key={i} className={cls} disabled={selected !== null} onClick={() => setSelected(i)}>
                {opt}
              </button>
            );
          })}
          {selected !== null && (
            <div className={'quiz-explanation' + (selected !== correctIndex ? ' wrong-exp' : '')}>
              {explanation}
            </div>
          )}
        </div>
      );
    }

              <h3 style={{ marginTop: '2rem' }}>{tx.s2KimballInmonTitle}</h3>
              <div className="concept-box">
                <p style={{ margin: 0, fontSize: '0.9rem', lineHeight: 1.7 }}>{tx.s2KimballInmonText}</p>
              </div>

              <h3 style={{ marginTop: '2rem' }}>{tx.s2SCDTitle}</h3>
              <div className="tip-box">
                <p style={{ margin: 0, fontSize: '0.9rem', lineHeight: 1.7 }}>{tx.s2SCDText}</p>
              </div>

              <div className="info-box" style={{ marginTop: '1.5rem' }}>
                <h4 style={{ margin: '0 0 0.4rem', color: 'var(--col-primary)' }}>{tx.s2TipTitle}</h4>
                <p style={{ margin: 0 }}>{tx.s2TipText}</p>
              </div>
            </section>

            {/* ── Section 3: Datenqualitat ── */}
            <section id="qualitaet" className="section-block">
              <h2>{tx.s3Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <p>{tx.s3Desc}</p>

              <div className="info-box" style={{ marginTop: '1rem' }}>
                <h4 style={{ margin: '0 0 0.4rem', color: 'var(--col-primary)' }}>{tx.s3FrameworkTitle}</h4>
                <p style={{ margin: 0, fontSize: '0.9rem', lineHeight: 1.7 }}>{tx.s3FrameworkText}</p>
              </div>

              <h3 style={{ marginTop: '1.5rem' }}>{tx.s3ProblemsTitle}</h3>
              <div style={{ margin: '1rem 0' }}>
                {tx.s3Problems.map((prob, i) => (
                  <div key={i} style={{
                    display: 'flex', gap: '1rem', padding: '0.9rem 0',
                    borderBottom: '1px solid #E5E7EB', alignItems: 'flex-start'
                  }}>
                    <div style={{
                      flexShrink: 0, width: '28px', height: '28px',
                      background: 'var(--col-primary)', color: 'white',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontFamily: "'Space Grotesk', sans-serif", fontWeight: 800, fontSize: '0.8rem',
                      borderRadius: '4px'
                    }}>{i + 1}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: '0.95rem', color: 'var(--col-primary)', marginBottom: '0.2rem' }}>{prob.name}</div>
                      <div style={{ fontSize: '0.875rem', color: '#4B5563', lineHeight: 1.5, marginBottom: '0.35rem' }}>{prob.desc}</div>
                      <div style={{ fontSize: '0.82rem', color: '#374151', background: '#F3F4F6', padding: '0.2rem 0.55rem', borderRadius: '4px', display: 'inline-block', fontFamily: "'Fira Code', 'Courier New', monospace" }}>
                        {'\u2192 '}{prob.fix}
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              <h3 style={{ marginTop: '2rem' }}>{tx.s3PandasTitle}</h3>
              <CodeBlock code={tx.s3CodePandas} lang={lang} />

              <h3 style={{ marginTop: '2rem' }}>{tx.s3PowerBITitle}</h3>
              <div className="concept-box">
                <p style={{ margin: '0 0 0.75rem' }}>{tx.s3PowerBIText}</p>
                <ul style={{ margin: 0, paddingLeft: '1.25rem' }}>
                  {tx.s3PowerBISteps.map((step, i) => (
                    <li key={i} style={{ fontSize: '0.875rem', color: '#374151', lineHeight: 1.8, fontFamily: "'Fira Code', 'Courier New', monospace" }}>{step}</li>
                  ))}
                </ul>
              </div>
            </section>

            {/* ── Section 4: YouTube-Ressourcen ── */}
            <section id="youtube" className="section-block">
              <h2>{tx.s4Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <p>{tx.s4Desc}</p>

              <div className="youtube-box">
                <h3>{'YouTube'}</h3>
                {tx.s4Resources.map((res, i) => (
                  <div key={i} style={{
                    marginBottom: i < tx.s4Resources.length - 1 ? '1.25rem' : 0,
                    paddingBottom: i < tx.s4Resources.length - 1 ? '1.25rem' : 0,
                    borderBottom: i < tx.s4Resources.length - 1 ? '1px solid #FED7AA' : 'none'
                  }}>
                    <a href={res.url} target="_blank" rel="noopener noreferrer" className="youtube-link">{res.title}</a>
                    <p style={{ margin: '0.25rem 0 0', fontSize: '0.875rem', color: '#78350F' }}>{res.desc}</p>
                  </div>
                ))}
              </div>
            </section>

            {/* ── Section 5: Quiz ── */}
            <section id="quiz" className="section-block">
              <h2>{tx.s5Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <p>{tx.s5Desc}</p>

              {tx.s5Questions.map((q, i) => (
                <QuizQuestion
                  key={lang + '-' + i}
                  question={(i + 1) + '. ' + q.q}
                  options={q.opts}
                  correctIndex={q.correct}
                  explanation={q.exp}
                />
              ))}
            </section>

            {/* ── Section 6: Zusammenfassung ── */}
            <section id="zusammenfassung" className="section-block">
              <span className="bauhaus-badge">{lang === 'de' ? 'ZUSAMMENFASSUNG' : 'SUMMARY'}</span>
              <div className="bauhaus-accent-line" />
              <h2>{tx.summaryTitle}</h2>
              <div className="concept-box">
                <ul style={{ margin: 0, paddingLeft: '1.2rem', lineHeight: 1.85 }}>
                  {tx.summaryItems.map((item, i) => <li key={i} style={{ fontSize: '0.92rem', marginBottom: '0.3rem' }}>{item}</li>)}
                </ul>
              </div>
            </section>

            {/* ── Nav Bottom ── */}
            <div className="nav-bottom">
              <a href={'lab-01-grundlagen.html' + (lang === 'en' ? '?lang=en' : '')} className="nav-btn">
                {tx.navPrev}
              </a>
              <a href={'lab-03-kpis.html' + (lang === 'en' ? '?lang=en' : '')} className="nav-btn primary">
                {tx.navNext}
              </a>
            </div>

          </main>

          {/* Footer */}
          <footer className="footer">
            {'THWS Business School \u00B7 BI Lab \u00B7 Prof. Dr. Robert Butscher \u00B7 2026'}
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

    const { useState, useEffect } = React;

    // ─── CodeBlock Component ──────────────────────────────────────────────────
    function CodeBlock({ code }) {
      const [copied, setCopied] = React.useState(false);
      const copy = () => {
        navigator.clipboard.writeText(code).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        }).catch(() => {
          const el = document.createElement('textarea');
          el.value = code;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      };
      return (
        <div style={{ position: 'relative', marginBottom: '1rem' }}>
          <pre className="code-block">{code}</pre>
          <button onClick={copy} style={{
            position: 'absolute', top: '0.5rem', right: '0.5rem',
            background: copied ? '#059669' : '#E5E7EB',
            color: copied ? 'white' : '#374151',
            border: 'none', borderRadius: '4px',
            padding: '0.2rem 0.5rem', fontSize: '0.75rem',
            cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif'
          }}>
            {copied ? '\u2713 Kopiert' : 'Kopieren'}
          </button>
        </div>
      );
    }

fig.show()`;

    const CODE_DASH_APP = `# app.py – Vollständiges Dash-Dashboard
import dash
from dash import dcc, html, Input, Output
import plotly.express as px
import pandas as pd

app = dash.Dash(__name__)
server = app.server  # Nötig für gunicorn app:server
df = pd.read_csv('superstore.csv', encoding='latin-1')

app.layout = html.Div([
    html.H1('Sales Dashboard', style={'fontFamily': 'Space Grotesk', 'color': '#1E3A8A'}),

    html.Label('Kategorie auswählen:'),
    dcc.Dropdown(
        id='category-filter',
        options=[{'label': c, 'value': c} for c in df['Category'].unique()],
        value=df['Category'].unique()[0],
        clearable=False
    ),

    dcc.Graph(id='subcategory-chart'),
    dcc.Graph(id='profit-scatter')
], style={'maxWidth': '1200px', 'margin': '0 auto', 'padding': '2rem'})


@app.callback(
    Output('subcategory-chart', 'figure'),
    Input('category-filter', 'value')
)
def update_bar(category):
    filtered = df[df['Category'] == category]
    sales_by_sub = filtered.groupby('Sub-Category')['Sales'].sum().reset_index()
    fig = px.bar(
        sales_by_sub,
        x='Sub-Category',
        y='Sales',
        title=f'Umsatz nach Sub-Kategorie: {category}',
        color_discrete_sequence=['#2563EB']
    )
    return fig


@app.callback(
    Output('profit-scatter', 'figure'),
    Input('category-filter', 'value')
)
def update_scatter(category):
    filtered = df[df['Category'] == category]
    fig = px.scatter(
        filtered,
        x='Sales',
        y='Profit',
        hover_data=['Product Name'],
        title=f'Umsatz vs. Gewinn: {category}',
        color_discrete_sequence=['#0D9488']
    )
    return fig


if __name__ == '__main__':
    app.run(debug=True)`;

function CodeBlock({ code }) {
  var [copied, setCopied] = React.useState(false);
  var copy = function() {
    navigator.clipboard.writeText(code).then(function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1500);
    }).catch(function() {
      var el = document.createElement('textarea');
      el.value = code;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1500);
    });
  };
  return (
    <div style={{ position: 'relative', marginBottom: '1rem' }}>
      <pre className="code-block">{code}</pre>
      <button onClick={copy} style={{
        position: 'absolute', top: '0.5rem', right: '0.5rem',
        background: copied ? '#059669' : '#E5E7EB',
        color: copied ? 'white' : '#374151',
        border: 'none', padding: '0.2rem 0.5rem', fontSize: '0.75rem',
        cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif'
      }}>{copied ? '\u2713 Kopiert' : 'Kopieren'}</button>
    </div>
  );
}

var codeDashApp = `# app.py \u2013 Superstore Sales Dashboard
import dash
from dash import dcc, html, Input, Output
import plotly.express as px
import pandas as pd

app = dash.Dash(__name__)

df = pd.read_csv('superstore.csv', encoding='latin-1')
df['Order Date'] = pd.to_datetime(df['Order Date'])

app.layout = html.Div([
    html.H1('Superstore Sales Dashboard',
            style={'fontFamily': 'sans-serif', 'padding': '20px'}),

    html.Div([
        html.Label('Region:'),
        dcc.Dropdown(
            id='region-filter',
            options=[{'label': r, 'value': r}
                     for r in df['Region'].unique()],
            value=df['Region'].unique().tolist(),
            multi=True
        ),
    ], style={'padding': '0 20px', 'maxWidth': '400px'}),

    html.Div([
        dcc.Graph(id='umsatz-trend'),
        dcc.Graph(id='kategorie-bar'),
    ], style={'display': 'grid', 'gridTemplateColumns': '1fr 1fr',
              'gap': '20px', 'padding': '20px'}),
])

@app.callback(
    Output('umsatz-trend', 'figure'),
    Output('kategorie-bar', 'figure'),
    Input('region-filter', 'value')
)
def update_charts(regions):
    filtered = df[df['Region'].isin(regions)]

    # Trend
    monthly = (filtered.resample('ME', on='Order Date')['Sales']
               .sum().reset_index())
    fig1 = px.line(monthly, x='Order Date', y='Sales',
                   title='Umsatz-Trend')

    # Kategorie
    by_cat = (filtered.groupby('Category')['Sales']
              .sum().reset_index())
    fig2 = px.bar(by_cat, x='Category', y='Sales',
                  title='Umsatz nach Kategorie',
                  color_discrete_sequence=['#2563EB'])
    return fig1, fig2

if __name__ == '__main__':
    app.run(debug=True)`;

              onClick={function(e) { e.preventDefault(); scrollTo(item.id); }}
            >{item.label}</a>
          );
        })}
      </nav>

      <main className="main-content">

        <section id="ueberblick" className="section-block">
          <span className="bauhaus-badge">{t.badge}</span>
          <h2 style={{ marginTop: '0.75rem', fontSize: '2rem' }}>{t.pageTitle}</h2>
          <div className="bauhaus-accent-line"></div>
          <div className="lernziele-box">
            <h3 className="lernziele-heading">{t.s1.lernzieleHeading}</h3>
            <ol style={{ margin: 0, paddingLeft: '1.25rem' }}>
              {t.s1.goals.map(function(g, i) {
                return <li key={i} style={{ marginBottom: '0.4rem', lineHeight: '1.6' }}>{g}</li>;
              })}
            </ol>
          </div>
        </section>

        <section id="designprinzipien" className="section-block">
          <h2>{t.s2.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <h3>{t.s2.principlesHeading}</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '1rem', margin: '1.25rem 0' }}>
            {t.s2.principles.map(function(p, i) {
              return (
                <div key={i} className="concept-box">
                  <h4 style={{ marginTop: 0 }}>{p.title}</h4>
                  <p style={{ margin: 0, fontSize: '0.9rem' }}>{p.desc}</p>
                </div>
              );
            })}
          </div>

          <h3 style={{ marginTop: '2rem' }}>{t.s2.tableHeading}</h3>
          <table>
            <thead>
              <tr>
                <th>{t.s2.colSituation}</th>
                <th>{t.s2.colChart}</th>
              </tr>
            </thead>
            <tbody>
              {t.s2.chartRows.map(function(row, i) {
                return (
                  <tr key={i}>
                    <td>{row[0]}</td>
                    <td>{row[1]}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div className="tip-box">
            <strong>{t.s2.tipTitle}</strong>
            <p style={{ margin: '0.4rem 0 0', fontSize: '0.9rem' }}>{t.s2.tipText}</p>
          </div>
        </section>

        <section id="plotly-express" className="section-block">
          <h2>{t.s3.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <p>{t.s3.intro}</p>
          <h3>{t.s3.codeHeading}</h3>
          <CodeBlock code={codePlotlyExpress} />
        </section>

        <section id="dash-architektur" className="section-block">
          <h2>{t.s4.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <p>{t.s4.intro}</p>

          <h3>{t.s4.conceptsHeading}</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem', margin: '1rem 0 1.5rem' }}>
            {t.s4.concepts.map(function(c, i) {
              return (
                <div key={i} className="info-box">
                  <h4 style={{ marginTop: 0 }}>{c.title}</h4>
                  <p style={{ margin: 0, fontSize: '0.9rem' }}>{c.desc}</p>
                </div>
              );
            })}
          </div>

          <h3>{t.s4.archHeading}</h3>
          <CodeBlock code={codeArchitektur} />

          <h3 style={{ marginTop: '2rem' }}>{t.s4.appHeading}</h3>
          <CodeBlock code={codeDashApp} />
        </section>

        <section id="vergleich" className="section-block">
          <h2>{t.s5.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <table>
            <thead>
              <tr>
                <th>{t.s5.colAspect}</th>
                <th>{t.s5.colPowerBI}</th>
                <th>{t.s5.colDash}</th>
              </tr>
            </thead>
            <tbody>
              {t.s5.tableRows.map(function(row, i) {
                return (
                  <tr key={i}>
                    <td><strong>{row[0]}</strong></td>
                    <td>{row[1]}</td>
                    <td>{row[2]}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div className="concept-box">
            <p style={{ margin: 0 }}>{t.s5.conceptBoxText}</p>
          </div>
        </section>

        <section id="ressourcen" className="section-block">
          <h2>{t.s6.heading}</h2>
          <div className="bauhaus-accent-line"></div>
          <p>{t.s6.intro}</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
            {t.s6.resources.map(function(r, i) {
              return (
                <div key={i} className="tip-box" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '0.5rem' }}>
                  <div>
                    <strong style={{ fontSize: '0.95rem' }}>{r.title}</strong>
                  </div>
                  <a href={r.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: '0.85rem', color: '#2563EB', fontWeight: 600, textDecoration: 'none' }}>{r.url.replace('https://', '')}</a>
                </div>
              );
            })}
          </div>
        </section>

        <div className="nav-bottom">
          <a href="lab-03-kpis.html" className="nav-btn">{t.navBack}</a>
          <a href="lab-05-fallstudie.html" className="nav-btn primary">{t.navNext}</a>
        </div>
      </main>

      <footer className="footer">
        <p className="footer-text">{'THWS Business School \u2013 Business Intelligence Lab \u2013 Lab 04: Dashboard-Design & Plotly Dash'}</p>
      </footer>
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

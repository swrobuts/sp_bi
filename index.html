<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI Lab – Business Intelligence · THWS Business School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* DESIGN DECISION: Bilingual color scheme
       DE mode: Navy #1E3A8A (primary brand color)
       EN mode: Teal #0D9488 (alternative accent)
       The language toggle intentionally switches the entire color palette. */

    :root {
      --primary: #1E3A8A;
      --accent: #2563EB;
      --dark: #1A1A1A;
      --light-bg: #FAFAFA;
      --primary-light: rgba(30,58,138,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #FFFFFF;
      color: var(--dark);
    }

    h2 { color: #1E3A8A; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }
    h3 { color: #1E3A8A; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    a { color: var(--primary); }
    button { transition: all 0.2s ease; }

    .bauhaus-accent-line {
      width: 48px;
      height: 4px;
      background: #2563EB;
      margin: 0.5rem 0 1rem 0;
    }

    .bauhaus-badge {
      background: #2563EB;
      color: white;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
    }

    /* Geometric background animations */
    @keyframes floatCircle {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    @keyframes floatSquare {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(20px) rotate(8deg); }
    }

    .geo-circle {
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 50%;
      opacity: 0.15;
      top: -80px; right: -100px;
      animation: floatCircle 8s ease-in-out infinite;
      pointer-events: none;
    }
    .geo-square {
      position: absolute;
      width: 260px; height: 260px;
      opacity: 0.2;
      bottom: -60px; left: -60px;
      animation: floatSquare 10s ease-in-out infinite;
      pointer-events: none;
    }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      height: 56px;
      background: white;
      border-bottom: 1px solid #E5E7EB;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    /* Lang toggle */
    .lang-btn {
      padding: 0.25rem 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      background: transparent;
      color: #1A1A1A;
      transition: background 0.15s, color 0.15s;
    }
    .lang-btn.active {
      background: #1E3A8A;
      color: white;
      border-color: #1E3A8A;
    }
    .lang-btn:hover:not(.active) { background: #f5f5f5; }

    /* Hero */
    .hero {
      background: #1E3A8A;
      position: relative;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 3rem;
      overflow: hidden;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 3.5rem 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .hero-tag {
      border: 1.5px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.85);
      padding: 0.25rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 1.5rem;
    }
    .hero-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 1rem;
    }
    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 12rem;
      color: white;
      line-height: 0.95;
      margin-bottom: 0.5rem;
    }
    .hero-subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      font-size: 2.6rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 1.25rem;
      letter-spacing: 0.02em;
    }
    .hero-desc {
      color: rgba(255,255,255,0.88);
      font-size: 1.25rem;
      margin-bottom: 2.5rem;
    }
    .course-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .course-badge {
      border: 1.5px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.75);
      padding: 0.2rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 600;
      display: inline-block;
    }
    .cta-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: white;
      color: #1E3A8A;
      padding: 0.75rem 1.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border: 2px solid white;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #E0E7FF; border-color: #E0E7FF; }
    .btn-outline-white {
      background: transparent;
      color: white;
      padding: 0.75rem 1.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border: 2px solid rgba(255,255,255,0.6);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-outline-white:hover { border-color: white; color: white; }

    /* Stats Bar */
    .stats-bar {
      background: white;
      box-shadow: 0 -1px 0 rgba(30,58,138,0.08), 0 4px 20px rgba(0,0,0,0.05);
    }
    .stats-grid {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: space-around;
      align-items: center;
    }
    .stat-item {
      text-align: center;
      min-width: 120px;
      padding: 1.75rem 1.5rem;
      position: relative;
    }
    .stat-item + .stat-item::before {
      content: '';
      position: absolute; left: 0; top: 25%; height: 50%;
      width: 1px; background: rgba(30,58,138,0.12);
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 2.75rem;
      color: #1E3A8A;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .stat-label {
      font-size: 0.9rem;
      color: #6B7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.35rem;
    }

    /* Quote Section */
    .quote-section {
      background: #F7F7F5;
      padding: 5.5rem 2rem 5rem;
      border-top: 1px solid #E5E7EB;
      border-bottom: 1px solid #E5E7EB;
    }
    .quote-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
    }
    .quote-text-block {
      width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s,
                  transform 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s;
    }
    .quote-text-block.q-visible {
      opacity: 1;
      transform: translateY(0);
    }
    .quote-body {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(2.6rem, 5vw, 4.5rem);
      line-height: 1.2;
      color: #1A1A1A;
      font-style: italic;
      font-weight: 400;
      text-align: center;
      margin: 0;
    }
    .quote-author-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }
    .quote-attribution {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .quote-name {
      font-family: 'EB Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 1.2rem;
      color: #1A1A1A;
      font-style: normal;
    }
    .quote-role {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      color: #9CA3AF;
      font-weight: 400;
      font-style: normal;
    }
    @media (max-width: 640px) {
      .quote-body { font-size: 2rem; }
    }

    /* Labs Section */
    .labs-section {
      background: #FFFFFF;
      padding: 3.5rem 2rem;
    }
    .section-header {
      max-width: 1200px;
      margin: 0 auto 2.5rem;
    }
    .labs-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }
    @media (max-width: 900px) { .labs-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) {
      .hero-title { font-size: 4rem; }
      .hero-subtitle { font-size: 1.4rem; }
      .labs-grid { grid-template-columns: 1fr; }
      .stat-item + .stat-item::before { display: none; }
    }

    .lab-card {
      border: 2px solid #1A1A1A;
      border-left: 4px solid #2563EB;
      border-radius: 0;
      background: white;
      padding: 1.75rem 1.75rem;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 220px;
    }
    .lab-num-badge {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: 2.5rem;
      color: #2563EB;
      line-height: 1;
      margin-bottom: 0.75rem;
      letter-spacing: -0.03em;
      position: static;
      padding: 0;
      background: none;
    }
    .lab-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: #1E3A8A;
      margin-bottom: 0.1rem;
    }
    .lab-subtitle {
      font-size: 0.8rem;
      color: #6B7280;
      font-weight: 500;
    }
    .lab-desc {
      font-size: 0.875rem;
      color: #374151;
      line-height: 1.5;
      flex: 1;
    }
    .btn-lab-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: calc(100% + 3.5rem);
      margin: auto -1.75rem -1.75rem;
      padding: 1rem 1.75rem;
      background: none;
      border-top: 1px solid #E5E7EB;
      color: #1A1A1A;
      font-weight: 800;
      font-size: 1rem;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .btn-lab-link::after {
      content: '\2192';
      font-size: 1.1rem;
      transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-lab-link:hover {
      background: #1E3A8A;
      color: white;
      border-top-color: #1E3A8A;
    }

    /* Bonus Card */
    .bonus-card {
      grid-column: span 3;
      border: 2px dashed #93C5FD;
      padding: 32px 32px 0;
      display: flex;
      flex-direction: column;
      position: relative;
      background: #F8FAFF;
    }
    @media (max-width: 640px) {
      .bonus-card { grid-column: span 1; }
      .bonus-inner { grid-template-columns: 1fr !important; }
    }
    .bonus-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: white;
      background: #2563EB;
      border: none;
      padding: 4px 12px;
      margin-bottom: 16px;
      width: fit-content;
    }
    .bonus-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: #1E3A8A;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      line-height: 1.15;
    }
    .bonus-subtitle {
      font-size: 0.85rem;
      color: #4B5563;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .bonus-highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .bonus-chip {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1E3A8A;
      background: #DBEAFE;
      padding: 5px 12px;
      border: none;
    }
    .bonus-inner {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 32px;
      align-items: start;
    }
    .bonus-divider {
      background: #BFDBFE;
      height: 100%;
      min-height: 160px;
    }
    .bonus-why {
      font-size: 1rem;
      color: #374151;
      line-height: 1.65;
      margin-bottom: 0;
    }
    .bonus-criteria {
      list-style: none;
      padding: 0; margin: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .bonus-criteria li {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .bonus-crit-num {
      flex-shrink: 0;
      width: 24px; height: 24px;
      background: #1E3A8A;
      color: white;
      font-size: 0.7rem;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
      border-radius: 50%;
    }
    .bonus-crit-text strong {
      display: block;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #1E3A8A;
      margin-bottom: 2px;
    }
    .bonus-crit-text span {
      font-size: 0.9rem;
      color: #4B5563;
      line-height: 1.5;
    }
    .btn-bonus-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 2px dashed #93C5FD;
      padding: 16px 0;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1E3A8A;
      text-decoration: none;
      margin-top: 28px;
      transition: color 0.15s;
    }
    .btn-bonus-link:hover { color: #2563EB; }

    /* Footer */
    .footer {
      background: #1A1A1A;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 3rem 2rem;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .footer-sep {
      width: 48px;
      height: 3px;
      background: #2563EB;
      margin-bottom: 1.25rem;
    }
    .footer-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: white;
      letter-spacing: -0.01em;
    }
    .footer-tagline {
      color: rgba(255,255,255,0.5);
      font-size: 0.875rem;
      font-weight: 500;
      margin-top: 0.35rem;
    }
    .footer-nav-label {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9CA3AF;
      margin-bottom: 0.75rem;
    }
    .footer-nav-links {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .footer-nav-links a {
      color: rgba(255,255,255,0.55);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-nav-links a:hover { color: white; }
    .footer-bottom {
      max-width: 1200px;
      margin: 2rem auto 0;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.35);
      font-size: 0.8rem;
      text-align: center;
    }

    /* ═══════════════════════════════════════════
       EN TEAL MODE
       DE = Navy (#1E3A8A) | EN = Teal (#0D9488)
       ═══════════════════════════════════════════ */
    [data-lang="en"] h2,
    [data-lang="en"] h3 { color: #0D9488; }
    [data-lang="en"] .bauhaus-accent-line { background: #14B8A6; }
    [data-lang="en"] .bauhaus-badge { background: #0D9488; }
    [data-lang="en"] .lab-card { border-left-color: #14B8A6; }
    [data-lang="en"] .lab-num-badge { color: #1A1A1A; }
    [data-lang="en"] .lab-title { color: #0D9488; }
    [data-lang="en"] .btn-lab-link { color: #1A1A1A; }
    [data-lang="en"] .btn-lab-link:hover { background: #14B8A6; color: white; border-top-color: #14B8A6; }
    [data-lang="en"] .stat-value { color: #1A1A1A; }
    [data-lang="en"] .stat-label { color: #6B7280; }
    [data-lang="en"] .stat-item + .stat-item::before { background: rgba(0,0,0,0.12); }
    [data-lang="en"] .quote-name { color: #0D9488; }
    [data-lang="en"] .bonus-card { border-color: #99F6E4; background: #F0FDFA; }
    [data-lang="en"] .bonus-badge { background: #0D9488; }
    [data-lang="en"] .bonus-chip { background: #CCFBF1; color: #0F766E; }
    [data-lang="en"] .bonus-title { color: #0F766E; }
    [data-lang="en"] .bonus-crit-num { background: #0D9488; }
    [data-lang="en"] .bonus-crit-text strong { color: #0F766E; }
    [data-lang="en"] .bonus-divider { background: #99F6E4; }
    [data-lang="en"] .btn-bonus-link { border-top-color: #99F6E4; color: #0F766E; }
    [data-lang="en"] .btn-bonus-link:hover { color: #0D9488; }
    [data-lang="en"] .btn-bonus-link:hover { color: #0D9488; }
    [data-lang="en"] .bonus-crit-num { background: #0D9488; }
    [data-lang="en"] .lang-btn.active { background: #0D9488; border-color: #0D9488; }
    [data-lang="en"] .footer { background: #0D9488; }
    [data-lang="en"] .footer-sep { background: #14B8A6; }
    [data-lang="en"] .footer-nav-links a { color: rgba(255,255,255,0.75); }
    [data-lang="en"] .footer-nav-links a:hover { color: white; }
    [data-lang="en"] .footer-bottom { border-top-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); }
    [data-lang="en"] .footer-tagline { color: rgba(255,255,255,0.75); }

    /* Deming Portrait */
    .deming-portrait {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
      object-position: top center;
      filter: grayscale(100%) contrast(0.9);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
    }

    /* Implementierte Dashboards Section */
    .dashboards-section {
      background: #FAFAFA;
      padding: 3.5rem 2rem;
      border-top: 1px solid #E5E7EB;
    }
    .dashboards-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    @media (max-width: 900px) { .dashboards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .dashboards-grid { grid-template-columns: 1fr; } }
    .dashboard-card {
      border: 1.5px solid #E5E7EB;
      border-left: 4px solid #2563EB;
      background: white;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s ease;
    }
    .dashboard-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .live-badge {
      display: inline-block;
      background: #059669;
      color: white;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      flex-shrink: 0;
    }
    .dashboard-card-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;

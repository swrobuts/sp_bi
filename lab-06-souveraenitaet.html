<script type="text/babel">
  var urlLang = new URLSearchParams(window.location.search).get('lang');

  function CodeBlock({ code }) {
    const [copied, setCopied] = React.useState(false);
    const copy = () => {
      navigator.clipboard.writeText(code).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); }).catch(() => { const el = document.createElement('textarea'); el.value = code; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); setCopied(true); setTimeout(() => setCopied(false), 1500); });
    };
    return (
      <div style={{ position: 'relative', marginBottom: '1rem' }}>
        <pre className="code-block">{code}</pre>
        <button onClick={copy} style={{ position: 'absolute', top: '0.5rem', right: '0.5rem', background: copied ? '#059669' : '#E5E7EB', color: copied ? 'white' : '#374151', border: 'none', padding: '0.2rem 0.5rem', fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif' }}>{copied ? '✓ Kopiert' : 'Kopieren'}</button>
      </div>
    );
  }

  var metabaseComposeCode = `version: '3'
services:
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_HOST: postgres
      MB_DB_USER: metabase
      MB_DB_PASS: metabasepassword
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabasepassword
      POSTGRES_DB: metabase
    volumes:
      - metabase_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  metabase_data:`;

  var metabaseStartCode = `# Metabase starten
docker compose up -d

# Status pr\u00fcfen
docker compose ps

# Logs anzeigen
docker compose logs -f metabase

# Zugriff im Browser: http://localhost:3000`;

  function App() {

    const [activeSection, setActiveSection] = React.useState('ueberblick');
    const [checks, setChecks] = React.useState(Array(6).fill(false));

    const toggleLang = (l) => { setLang(l); localStorage.setItem('bi-lang', l); };
    const toggleCheck = (i) => { const c = [...checks]; c[i] = !c[i]; setChecks(c); };

    const de = lang === 'de';

    React.useEffect(() => {
      document.documentElement.setAttribute('data-lang', lang);
    }, [lang]);

    React.useEffect(() => {
      const handleScroll = () => {
        var sections = ['ueberblick', 'souveraenitaet', 'cloud-lockin', 'open-source', 'docker-setup', 'dsgvo', 'entscheidung', 'abschlussprojekt', 'ressourcen'];
        var current = 'ueberblick';
        for (var i = 0; i < sections.length; i++) {
          var el = document.getElementById(sections[i]);
          if (el) {
            var rect = el.getBoundingClientRect();
            if (rect.top <= 100) current = sections[i];
          }
        }
        setActiveSection(current);
      };
      window.addEventListener('scroll', handleScroll, { passive: true });
      return () => window.removeEventListener('scroll', handleScroll);
    }, []);

    var dsgvoItemsDE = [
      'Verarbeitungsverzeichnis angelegt?',
      'Auftragsverarbeitungsvertrag (AVV) mit Cloud-Anbieter geschlossen?',
      'Datentransfer in Drittl\u00e4nder dokumentiert?',
      'Datenschutzfolgenabsch\u00e4tzung (DSFA) bei sensiblen Daten durchgef\u00fchrt?',
      'L\u00f6schkonzept vorhanden?',
      'Daten in EU-Infrastruktur (kein Transfer in USA)?'
    ];

    var dsgvoItemsEN = [
      'Record of processing activities (ROPA) created?',
      'Data Processing Agreement (DPA) signed with cloud provider?',
      'Data transfers to third countries documented?',
      'Data Protection Impact Assessment (DPIA) for sensitive data completed?',
      'Data deletion concept in place?',
      'Data stored in EU infrastructure (no transfer to USA)?'
    ];

    var dsgvoItems = de ? dsgvoItemsDE : dsgvoItemsEN;

    var navSections = de ? [
      { id: 'ueberblick', label: '\u00dcberblick' },
      { id: 'souveraenitaet', label: 'Digitale Souver\u00e4nit\u00e4t' },

      { id: 'entscheidung', label: 'Entscheidungsmatrix' },
      { id: 'abschlussprojekt', label: 'Abschlussprojekt-Idee' },
      { id: 'ressourcen', label: 'Ressourcen' }
    ] : [
      { id: 'ueberblick', label: 'Overview' },
      { id: 'souveraenitaet', label: 'Digital Sovereignty' },
      { id: 'cloud-lockin', label: 'Cloud Lock-in' },
      { id: 'open-source', label: 'Open-Source Alternatives' },
      { id: 'docker-setup', label: 'Docker Self-Hosted Setup' },
      { id: 'dsgvo', label: 'GDPR & Compliance' },
      { id: 'entscheidung', label: 'Decision Matrix' },
      { id: 'abschlussprojekt', label: 'Final Project Idea' },
      { id: 'ressourcen', label: 'Resources' }

    return (

        {/* Main Content */}

          {/* Section 1: Überblick */}
          <section id="ueberblick" className="section-block">
            <div className="bauhaus-badge">Lab 06</div>
            <h2 style={{ fontSize: '2rem', marginTop: '0.75rem' }}>
              {de ? 'Digitale Souver\u00e4nit\u00e4t & Open-Source BI' : 'Digital Sovereignty & Open-Source BI'}
            </h2>
            <div className="bauhaus-accent-line"></div>
            <p>
              {de
                ? 'In diesem Lab besch\u00e4ftigen wir uns mit der Frage, wem Ihre Daten geh\u00f6ren und wie Sie mit Open-Source-Tools und Self-Hosted-L\u00f6sungen vollst\u00e4ndige Kontrolle \u00fcber Ihre BI-Infrastruktur behalten k\u00f6nnen.'
                : 'In this lab, we explore the question of who owns your data and how you can maintain full control over your BI infrastructure using open-source tools and self-hosted solutions.'}

                </li>
                <li>
                  <span className="check-icon">4</span>
                  <span>{de ? 'Einfachen Self-Hosted BI-Stack mit Docker beschreiben' : 'Describe a simple self-hosted BI stack with Docker'}</span>
                </li>
              </ul>
            </div>
          </section>

          {/* Section 2: Was ist Digitale Souveränität? */}

            <div className="bauhaus-accent-line"></div>
            <p>
              {de
                ? 'Digitale Souver\u00e4nit\u00e4t bezeichnet die F\u00e4higkeit von Organisationen und Staaten, ihre eigene digitale Infrastruktur zu kontrollieren, unabh\u00e4ngig von externen Anbietern Entscheidungen zu treffen und die Hoheit \u00fcber ihre Daten zu behalten.'
                : 'Digital sovereignty refers to the ability of organisations and states to control their own digital infrastructure, make decisions independently of external providers, and retain ownership of their data.'}

                : 'The European Union has responded with initiatives such as GAIA-X and the European Cloud Initiative. The goal is to build a European cloud infrastructure that meets European data protection standards and reduces dependency on US and Chinese hyperscalers.'}

            <ul style={{ lineHeight: '2' }}>
              <li>{de ? 'Wo liegen meine Daten physisch gespeichert?' : 'Where are my data physically stored?'}</li>

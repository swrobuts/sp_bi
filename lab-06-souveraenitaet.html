  function CodeBlock({ code }) {
    var [copied, setCopied] = React.useState(false);
    var copy = function() {
      navigator.clipboard.writeText(code).then(function() {
        setCopied(true);
        setTimeout(function() { setCopied(false); }, 1500);
      }).catch(function() {
        var el = document.createElement('textarea');
        el.value = code;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        setCopied(true);
        setTimeout(function() { setCopied(false); }, 1500);
      });
    };
    return (
      <div style={{ position: 'relative', marginBottom: '1rem' }}>
        <pre className="code-block">{code}</pre>
        <button onClick={copy} style={{ position: 'absolute', top: '0.5rem', right: '0.5rem', background: copied ? '#059669' : '#E5E7EB', color: copied ? 'white' : '#374151', border: 'none', padding: '0.2rem 0.5rem', fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif' }}>{copied ? '\u2713 Kopiert' : 'Kopieren'}</button>
      </div>
    );
  }

  function ChecklistItem({ text, checked, onToggle }) {
    return (
      <div className="checklist-item">
        <div
          className={'checklist-check' + (checked ? ' checked' : '')}
          onClick={onToggle}
          role="checkbox"
          aria-checked={checked}
          tabIndex={0}
          onKeyDown={function(e) { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onToggle(); } }}
        >
          {checked && (
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          )}
        </div>
        <span className={'checklist-text' + (checked ? ' done' : '')}>{text}</span>
      </div>
    );
  }

    ports:

    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_HOST: postgres
      MB_DB_USER: metabase
      MB_DB_PASS: metabasepassword
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabasepassword
      POSTGRES_DB: metabase
    volumes:
      - metabase_data:/var/lib/postgresql/data

volumes:

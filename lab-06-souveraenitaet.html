<script type="text/babel">
  function CodeBlock({ code, lang }) {
    const [copied, setCopied] = React.useState(false);
    const copyLabel = lang === 'en' ? 'Copy' : 'Kopieren';
    const copiedLabel = lang === 'en' ? '\u2713 Copied' : '\u2713 Kopiert';
    const copy = () => {
      navigator.clipboard.writeText(code).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      }).catch(() => {
        const el = document.createElement('textarea');
        el.value = code;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      });
    };
    return (
      <div style={{ position: 'relative', marginBottom: '1rem' }}>
        <pre className="code-block">{code}</pre>
        <button onClick={copy} style={{ position: 'absolute', top: '0.5rem', right: '0.5rem', background: copied ? '#059669' : '#E5E7EB', color: copied ? 'white' : '#374151', border: 'none', padding: '0.2rem 0.5rem', fontSize: '0.75rem', cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif' }}>{copied ? copiedLabel : copyLabel}</button>
      </div>
    );
  }

  function ChecklistItem({ text, checked, onToggle }) {
    return (
      <div className="checklist-item">
        <div
          className={'checklist-check' + (checked ? ' checked' : '')}
          onClick={onToggle}
          role="checkbox"
          aria-checked={checked}
          tabIndex={0}
          onKeyDown={(e) => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onToggle(); } }}
        >
          {checked && (
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          )}
        </div>
        <span className={'checklist-text' + (checked ? ' done' : '')}>{text}</span>
      </div>
    );
  }

  function QuizQuestion({ question, index, lang }) {
    const [selected, setSelected] = React.useState(null);
    const handleClick = (i) => { if (selected === null) setSelected(i); };
    return (
      <div style={{ marginBottom: '1.75rem' }}>
        <p style={{ fontWeight: 600, marginBottom: '0.5rem' }}>{index}. {question.q}</p>
        {question.options.map((opt, i) => {
          let style = {};
          if (selected !== null) {
            if (i === question.correct) style = { borderColor: '#059669', background: '#F0FDF4', color: '#065F46' };
            else if (i === selected) style = { borderColor: '#DC2626', background: '#FEF2F2', color: '#991B1B' };
          }
          return (
            <button key={i} className="quiz-option" disabled={selected !== null} onClick={() => handleClick(i)} style={style}>
              {String.fromCharCode(65 + i)}) {opt}
            </button>
          );
        })}
        {selected !== null && (
          <div style={{ marginTop: '0.5rem', padding: '0.75rem 1rem', background: selected === question.correct ? '#F0FDF4' : '#FEF2F2', borderRadius: '8px', fontSize: '0.88rem', color: selected === question.correct ? '#065F46' : '#991B1B' }}>
            {question.explanation}
          </div>
        )}
      </div>
    );
  }

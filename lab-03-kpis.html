    // ─── CodeBlock Component ──────────────────────────────────────────────────
    function CodeBlock({ code }) {
      const [copied, setCopied] = React.useState(false);
      const copy = () => {
        navigator.clipboard.writeText(code).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        }).catch(() => {
          const el = document.createElement('textarea');
          el.value = code;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      };
      return (
        <div style={{ position: 'relative', marginBottom: '1rem' }}>
          <pre className="code-block">{code}</pre>
          <button onClick={copy} style={{
            position: 'absolute', top: '0.5rem', right: '0.5rem',
            background: copied ? '#059669' : '#E5E7EB',
            color: copied ? 'white' : '#374151',
            border: 'none', borderRadius: '4px',
            padding: '0.2rem 0.5rem', fontSize: '0.75rem',
            cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif'
          }}>
            {copied ? '\u2713 Kopiert' : 'Kopieren'}
          </button>
        </div>
      );
    }

        s2Title: 'Python Equivalents',
        s2Desc: 'The same KPIs you calculate in DAX can be implemented in Python using the pandas library. Here are the direct equivalents:',
        s2CodePython: '# Total revenue\ntotal_revenue = df[\'Amount\'].sum()\n\n# Revenue Germany\nrevenue_de = df[df[\'Country\'] == \'Germany\'][\'Amount\'].sum()\n\n# Margin\nmargin_pct = df[\'GrossProfit\'].sum() / df[\'Amount\'].sum() * 100\n\n# Year-over-year comparison\n# Note: df[\'Date\'] = pd.to_datetime(df[\'Date\'])  # ensure datetime type first\ndf[\'Year\'] = pd.to_datetime(df[\'Date\']).dt.year\nyearly = df.groupby(\'Year\')[\'Amount\'].sum()\ngrowth = yearly.pct_change() * 100\nprint(growth)\n\n# Ranking\ntop_products = (df.groupby(\'Product\')[\'Amount\'].sum()\n                  .sort_values(ascending=False)\n                  .reset_index())\ntop_products[\'Rank\'] = top_products[\'Amount\'].rank(method=\'dense\', ascending=False).astype(int)  # Column \'Amount\' corresponds to \'Sales\' in the Superstore dataset\nprint(top_products.head(10))',

        s3Title: 'KPI Table',
        s3Desc: 'The most important business KPIs at a glance \u2013 with formula, DAX function and Python equivalent.',
        s3Headers: ['KPI', 'Formula', 'DAX Function', 'Python (Pandas)'],
        s3Rows: [
          ['Total Revenue', '\u03A3 Amount', 'SUM()', '.sum()'],
          ['Gross Profit', 'Revenue \u2212 COGS', 'CALCULATE()', 'Subtraction'],
          ['Margin %', 'Profit / Revenue \u00D7 100', 'DIVIDE()', '/ * 100'],
          ['YoY Growth', '(Now \u2212 PY) / PY', 'SAMEPERIODLASTYEAR', 'pct_change()'],
          ['Conversion Rate', 'Purchases / Visits', 'DIVIDE()', '/'],

        ],

        s4Title: 'Filter Context',
        s4Desc: 'Understanding the filter context is the key to powerful DAX. There are two fundamental contexts in DAX:',
        s4RowTitle: 'Row Context',
        s4RowText: 'In Row Context, DAX iterates row by row over a table. This context is automatically created for Calculated Columns and for iterator functions like SUMX, AVERAGEX, MAXX. In each iteration the current row is known.',
        s4FilterTitle: 'Filter Context',
        s4FilterText: 'The Filter Context is the set of all active filters when a Measure is evaluated. These filters are created by slicers, report filters, rows/columns in a matrix or by CALCULATE() calls in the DAX code itself.',
        s4WhyCalcTitle: 'Why CALCULATE() is so powerful',

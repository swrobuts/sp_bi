function CodeBlock({ code }) {
  var [copied, setCopied] = React.useState(false);
  var copy = function() {
    navigator.clipboard.writeText(code).then(function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1500);
    }).catch(function() {
      var el = document.createElement('textarea');
      el.value = code;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1500);
    });
  };
  return (
    <div style={{ position: 'relative', marginBottom: '1rem' }}>
      <pre className="code-block">{code}</pre>
      <button onClick={copy} style={{
        position: 'absolute', top: '0.5rem', right: '0.5rem',
        background: copied ? '#059669' : '#E5E7EB',
        color: copied ? 'white' : '#374151',
        border: 'none', padding: '0.2rem 0.5rem', fontSize: '0.75rem',
        cursor: 'pointer', fontFamily: 'Space Grotesk, sans-serif'
      }}>
        {copied ? '\u2713 Kopiert' : 'Kopieren'}
      </button>
    </div>
  );
}

function QuizQuestion({ q, index, lang }) {
  var [selected, setSelected] = React.useState(null);
  var answered = selected !== null;

  return (
    <div style={{ marginBottom: '2rem', padding: '1.25rem', background: 'white', border: '1px solid #e5e7eb', borderRadius: '8px' }}>
      <p style={{ fontWeight: 700, marginTop: 0, marginBottom: '0.75rem' }}>
        {index + 1}. {q.question}
      </p>
      {q.options.map(function(opt, i) {
        var cls = 'quiz-option';
        if (answered) {
          if (i === q.correct) cls += ' correct';
          else if (i === selected && i !== q.correct) cls += ' wrong';
        }
        return (
          <button
            key={i}
            className={cls}
            disabled={answered}
            onClick={function() { setSelected(i); }}
          >
            {opt}
          </button>
        );
      })}
      {answered && (
        <div className={'quiz-explanation' + (selected === q.correct ? '' : ' wrong-exp')}>
          {selected === q.correct ? q.explanation : q.explanationWrong}
        </div>
      )}
    </div>
  );
}

function Quiz({ t, lang }) {
  var questions = t.s7Questions;
  var [answers, setAnswers] = React.useState(Array(questions.length).fill(null));

  var handleAnswer = function(qi, optIdx) {
    setAnswers(function(prev) {
      var next = prev.slice();
      if (next[qi] === null) next[qi] = optIdx;
      return next;
    });
  };

  var score = answers.filter(function(a, i) { return a === questions[i].correct; }).length;
  var allAnswered = answers.every(function(a) { return a !== null; });

  return (
    <div>
      <p style={{ color: '#555', marginBottom: '1.5rem' }}>{t.s7Subtitle}</p>
      {questions.map(function(q, qi) {
        var selected = answers[qi];
        var answered = selected !== null;
        return (
          <div key={qi} style={{ marginBottom: '2rem', padding: '1.25rem', background: 'white', border: '1px solid #e5e7eb', borderRadius: '8px' }}>
            <p style={{ fontWeight: 700, marginTop: 0, marginBottom: '0.75rem' }}>
              {qi + 1}. {q.question}
            </p>
            {q.options.map(function(opt, i) {
              var cls = 'quiz-option';
              if (answered) {
                if (i === q.correct) cls += ' correct';
                else if (i === selected && i !== q.correct) cls += ' wrong';
              }
              return (
                <button
                  key={i}
                  className={cls}
                  disabled={answered}
                  onClick={function() { handleAnswer(qi, i); }}
                >
                  {opt}
                </button>
              );
            })}
            {answered && (
              <div className={'quiz-explanation' + (selected === q.correct ? '' : ' wrong-exp')}>
                {selected === q.correct ? q.explanation : q.explanationWrong}
              </div>
            )}
          </div>
        );
      })}
      {allAnswered && (
        <div style={{ padding: '1rem 1.25rem', background: '#EFF6FF', border: '2px solid #2563EB', borderRadius: '8px', fontWeight: 700, fontSize: '1.05rem' }}>
          {t.s7ScoreText} {score} {t.s7Of} {questions.length}
        </div>
      )}
    </div>
  );
}

      var el = document.getElementById(id);
      if (!el) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          visibleSections[id] = entry.isIntersecting ? entry.intersectionRatio : 0;
          var best = null;
          var bestRatio = -1;
          sectionIds.forEach(function(sid) {
            if ((visibleSections[sid] || 0) > bestRatio) {
              bestRatio = visibleSections[sid] || 0;
              best = sid;
            }
          });
          if (best) setActiveSection(best);
        });
      }, { threshold: [0, 0.1, 0.5], rootMargin: '-56px 0px -40% 0px' });
      observer.observe(el);
      observers.push(observer);
    });

    return function() {
      observers.forEach(function(o) { o.disconnect(); });
    };

                  <a href={res.url} target="_blank" rel="noopener noreferrer" style={{ flexShrink: 0, color: '#2563EB', fontWeight: 700, textDecoration: 'none', fontSize: '0.88rem', display: 'flex', alignItems: 'center', gap: '0.25rem', whiteSpace: 'nowrap' }}>
                    {'YouTube '}{'↗'}
                  </a>
                </div>
              );
            })}
          </div>
        </section>

        {/* Section 7: Quiz */}
        <section id="quiz" className="section-block">
          <h2>{t.s7Title}</h2>
          <div className="bauhaus-accent-line"></div>
          <Quiz t={t} lang={lang} />
        </section>

        {/* Section 8: Zusammenfassung */}
        <section id="zusammenfassung" className="section-block">
          <h2>{t.s8Title}</h2>
          <div className="bauhaus-accent-line"></div>
          <p>{t.s8Subtitle}</p>
          <ul className="checklist">
            {t.s8Takeaways.map(function(item, i) {
              return (
                <li key={i}>
                  <span className="check-icon">{'✓'}</span>
                  <span>{item}</span>
                </li>
              );
            })}
          </ul>
        </section>

        {/* Bottom Navigation */}
        <nav className="nav-bottom">
          <a href="index.html" className="nav-btn">{t.navBack}</a>
          <a href={nextHref} className="nav-btn primary">{t.navNext}</a>
        </nav>
      </main>

      {/* Footer */}
      <footer className="footer">
        <p className="footer-text">{t.footerText}</p>
      </footer>
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
